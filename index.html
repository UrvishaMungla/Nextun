<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Your Nextun Account | Nextun</title>
  <meta name="description" content="Sign up for Nextun – the modern fintech platform for smarter trading." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Merriweather:wght@300;400&family=Roboto+Serif:opsz,wght@8..144,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="page-wrapper">

  <!-- ══════════════════════════════
       LEFT SIDE
  ══════════════════════════════ -->
  <div class="left-col">

    <!-- Logo —— swap logo.png with your exact Figma export (symbol + text) -->
    <div class="logo" id="logo">
      <img
        src="logo.png"
        alt="Nextun logo"
        class="logo-mark"
        id="logo-img"
      />
    </div>

    <!-- Illustration card  (617×617 in Figma) -->
    <!-- illus-wrap is the badge-positioning parent; illus-card clips the dot grid only -->
    <div class="illus-wrap">

      <div class="illus-card" id="illus-card">
        <!-- The user will replace trading_chart.png with their exact export from Figma -->
        <img src="trading_chart.png" alt="Trading Chart Illustration" class="trading-chart-img" />
      </div><!-- /.illus-card -->

    </div><!-- /.illus-wrap -->

  </div><!-- /.left-col -->


  <!-- ══════════════════════════════
       RIGHT SIDE — Form Card
       Figma: 760×864 · #FAFAFE · radius 24px
  ══════════════════════════════ -->
  <main class="form-card" id="form-card">

    <!-- ══════════════════════════════
         SIGNUP VIEW
    ══════════════════════════════ -->
    <div id="signup-view">
      <h1 class="form-title">Create Your Nextun Account</h1>

      <form id="signup-form" novalidate autocomplete="off">
        <!-- Email -->
        <div class="fgroup" id="grp-email">
          <label class="flabel" for="email">Email</label>
          <div class="ibox">
            <input class="finput" type="email" id="email" name="email" placeholder="Enter your email address" autocomplete="email"/>
          </div>
          <span class="ferr" id="email-err"></span>
        </div>

        <!-- Create Password -->
        <div class="fgroup" id="grp-pw">
          <label class="flabel" for="password">Create Password</label>
          <div class="ibox">
            <input class="finput with-eye" type="password" id="password" name="password" placeholder="Create a strong password" autocomplete="new-password"/>
            <button type="button" class="eye-btn" id="eye-pw" aria-label="Toggle password">
              <svg id="eye-pw-off" class="eye-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
              <svg id="eye-pw-on" class="eye-ico gone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="ferr" id="pw-err"></span>
        </div>

        <!-- Confirm Password -->
        <div class="fgroup" id="grp-cf">
          <label class="flabel" for="confirm">Confirm Password</label>
          <div class="ibox">
            <input class="finput with-eye" type="password" id="confirm" name="confirm" placeholder="Create a strong password" autocomplete="new-password"/>
            <button type="button" class="eye-btn" id="eye-cf" aria-label="Toggle confirm">
              <svg id="eye-cf-off" class="eye-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
              <svg id="eye-cf-on" class="eye-ico gone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="match-line" id="match-line"></span>
          <span class="ferr" id="cf-err"></span>
        </div>

        <!-- Terms -->
        <div class="terms-row" id="grp-terms">
          <label class="cb-label" for="terms">
            <input class="cb-real" type="checkbox" id="terms" name="terms" />
            <span class="cb-box">
              <svg class="cb-tick" viewBox="0 0 13 10" fill="none">
                <path d="M1.5 5L5 8.5L11.5 1.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <span class="cb-text">
              I have read and agree to <a href="#" id="privacy-link" class="txt-link txt-link--blue">Privacy Policy</a> and <a href="#" id="tos-link" class="txt-link txt-link--blue">Terms of Services</a>.
            </span>
          </label>
          <span class="ferr" id="terms-err"></span>
        </div>

        <!-- Next button -->
        <button type="submit" class="btn-next" id="btn-next">
          <span id="btn-lbl">Next</span>
          <span id="btn-spin" class="gone">
            <svg class="spinner" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2">
              <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83 M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
            </svg>
          </span>
        </button>
      </form>

      <!-- Already have an account -->
      <p class="login-row">
        Already have an account?&nbsp;
        <a href="#" class="txt-link txt-link--bold txt-link--blue" id="link-to-login">Log in →</a>
      </p>

      <!-- Continue with Google -->
      <button type="button" class="btn-google btn-google-signup">
        <svg width="20" height="20" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.6 32.7 29.3 36 24 36 c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7 C34.2 6.5 29.4 4 24 4 12.95 4 4 12.95 4 24s8.95 20 20 20 20-8.95 20-20c0-1.3-.15-2.6-.4-3.9z"/>
          <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.2 6.5 29.4 4 24 4 16.3 4 9.7 8.4 6.3 14.7z"/>
          <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.3 35.2 26.8 36 24 36c-5.2 0-9.6-3.3-11.2-8l-6.5 5C9.7 39.7 16.3 44 24 44z"/>
          <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.3 5.6l6.2 5.2C37 39 44 34 44 24c0-1.3-.15-2.6-.4-3.9z"/>
        </svg>
        <span>Continue With Google</span>
      </button>
    </div>

    <!-- ══════════════════════════════
         LOGIN VIEW
    ══════════════════════════════ -->
    <div id="login-view" class="gone">
      <h1 class="form-title" style="text-align: center;">Login &nbsp;to<br/>Your Nextun Account</h1>

      <form id="login-form" novalidate autocomplete="off">
        <!-- Email -->
        <div class="fgroup" id="login-grp-email">
          <label class="flabel" for="login-email">Email</label>
          <div class="ibox">
            <input class="finput" type="email" id="login-email" name="login-email" placeholder="Enter your email address" autocomplete="email"/>
          </div>
          <span class="ferr" id="login-email-err"></span>
        </div>

        <!-- Password -->
        <div class="fgroup" id="login-grp-pw">
          <label class="flabel" for="login-password">Create Password</label>
          <div class="ibox">
            <input class="finput with-eye" type="password" id="login-password" name="login-password" placeholder="Create a strong password" autocomplete="current-password"/>
            <button type="button" class="eye-btn" id="login-eye-pw" aria-label="Toggle password">
              <svg id="login-eye-pw-off" class="eye-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
              <svg id="login-eye-pw-on" class="eye-ico gone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="ferr" id="login-pw-err"></span>
        </div>

        <div class="forgot-row">
          <a href="#" class="txt-link txt-link--blue">Forgot Password?</a>
        </div>

        <!-- Next button -->
        <button type="submit" class="btn-next" id="login-btn-next">
          <span id="login-btn-lbl">Next</span>
          <span id="login-btn-spin" class="gone">
            <svg class="spinner" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2">
              <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83 M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
            </svg>
          </span>
        </button>
      </form>

      <!-- Don't have an account -->
      <p class="login-row">
        Don't have an account?&nbsp;
        <a href="#" class="txt-link txt-link--bold txt-link--blue" id="link-to-signup">Sign Up →</a>
      </p>

      <!-- Continue with Google -->
      <button type="button" class="btn-google btn-google-login">
        <svg width="20" height="20" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.6 32.7 29.3 36 24 36 c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7 C34.2 6.5 29.4 4 24 4 12.95 4 4 12.95 4 24s8.95 20 20 20 20-8.95 20-20c0-1.3-.15-2.6-.4-3.9z"/>
          <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.2 6.5 29.4 4 24 4 16.3 4 9.7 8.4 6.3 14.7z"/>
          <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.3 35.2 26.8 36 24 36c-5.2 0-9.6-3.3-11.2-8l-6.5 5C9.7 39.7 16.3 44 24 44z"/>
          <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.3 5.6l6.2 5.2C37 39 44 34 44 24c0-1.3-.15-2.6-.4-3.9z"/>
        </svg>
        <span>Continue With Google</span>
      </button>
    </div>

  </main><!-- /.form-card -->

</div><!-- /.page-wrapper -->

<script src="app.js"></script>
</body>
</html>
